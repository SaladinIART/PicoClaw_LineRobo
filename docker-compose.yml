services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto-log:/mosquitto/log

  logger:
    build: ./services/logger
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPICS: "bocobot/telemetry,bocobot/events"
      SQLITE_PATH: "/data/robot_runs.sqlite"
    volumes:
      - ./data:/data
    depends_on:
      - mosquitto